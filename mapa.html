<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimble Sense</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root {
      --bg: #34302F;
      --bg-soft: rgba(255, 255, 255, 0.08);
      --bg-panel: rgba(20, 20, 20, 0.48);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f1f1f1;
      --text-soft: #cfcfcf;
      --accent: #f4b400;
      --accent-soft: rgba(244, 180, 0, 0.18);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      background: var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      position: relative;
      z-index: 20;
      background: var(--bg);
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand-logo {
      height: 72px;
      width: auto;
      display: block;
    }

    .nav {
      display: flex;
      gap: 28px;
      align-items: center;
      font-size: 14px;
      color: var(--text-soft);
    }

    .nav-item {
      position: relative;
      color: var(--text-soft);
      text-decoration: none;
      font-weight: 600;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -6px;
      height: 2px;
      background: var(--accent);
      border-radius: 999px;
    }

    .workspace {
      flex: 1;
      min-height: 0;
      padding: 0 28px 28px 28px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      position: relative;
      z-index: 10;
      background: var(--bg);
    }

    .sidebar,
    .map-shell {
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      padding: 18px 18px 12px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .panel-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 6px 0;
    }

    .panel-subtitle {
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.45;
      margin: 0;
    }

    .controls {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .field select {
      width: 100%;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .field select option {
      color: #111;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.1);
    }

    .btn-primary {
      background: var(--accent-soft);
      border-color: rgba(244,180,0,0.4);
      color: var(--accent);
    }

    .status-card {
      margin: 0 18px 18px 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.45;
    }

    .legend {
      margin: 0 18px 18px 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .legend-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    .legend-scale {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #243b7a 0%, #2b7bff 25%, #40c8ff 45%, #f4b400 70%, #ff5f3a 100%);
      margin-bottom: 10px;
    }

    .legend-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-soft);
    }

    .map-shell {
      position: relative;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 420px;
    }

    .map-caption {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 500;
      background: rgba(18,18,18,0.78);
      color: var(--text-soft);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #202020;
      color: #f1f1f1;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 960px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .sidebar {
        order: 2;
      }

      .map-shell {
        order: 1;
        min-height: 420px;
      }

      #map {
        min-height: 420px;
      }

      .nav {
        display: none;
      }

      .brand-logo {
        height: 56px;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img class="brand-logo" src="Nimble%20VS%20AM%20CENTRO.png" alt="Nimble Virtual Solutions">
      </div>

      <div class="nav">
        <a href="#" class="nav-item active">início</a>
        <a href="#" class="nav-item">serviços</a>
        <a href="#" class="nav-item">contato</a>
      </div>
    </div>

    <div class="workspace">
      <div class="sidebar">
        <div class="panel-header">
          <h2 class="panel-title">Painel de Sessão</h2>
          <p class="panel-subtitle">
            Selecione uma coleta para visualizar os pontos detectados, sua intensidade e a permanência agregada no mapa.
          </p>
        </div>

        <div class="controls">
          <div class="field">
            <label for="sessionSelect">Sessão</label>
            <select id="sessionSelect"></select>
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="reloadBtn">Atualizar</button>
          </div>
        </div>

        <div class="status-card" id="status">
          Carregando dados da planilha...
        </div>

        <div class="legend">
          <div class="legend-title">Intensidade do Heatmap</div>
          <div class="legend-scale"></div>
          <div class="legend-row">
            <span>Menor permanência</span>
            <span>Maior permanência</span>
          </div>
        </div>
      </div>

      <div class="map-shell">
        <div id="map"></div>
        <div class="map-caption">Base cartográfica: OpenStreetMap</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQb2jTurQ3bmlTjrNktoGn3TrGcm2gdUDjEP1teOyFIEvmRU6mFdo84FRIhFza1e1a8BO9g3cmIwPFF/pub?gid=1075648457&single=true&output=csv";

    const statusEl = document.getElementById("status");
    const sessionSelect = document.getElementById("sessionSelect");
    const reloadBtn = document.getElementById("reloadBtn");

    const map = L.map("map").setView([-23.5882, -46.6439], 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 22,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let heatLayer = null;
    let pointLayerGroup = L.layerGroup().addTo(map);
    let allRows = [];

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (insideQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function normalizeNumber(value) {
      if (value === null || value === undefined) return NaN;
      const cleaned = String(value).trim().replace(",", ".");
      return parseFloat(cleaned);
    }

    function formatSession(sessionId) {
      if (!sessionId) return "";

      const timestamp = String(sessionId).replace("SESSAO_", "");
      const millis = parseInt(timestamp, 10);

      if (Number.isNaN(millis)) return sessionId;

      const date = new Date(millis);

      return date.toLocaleString("pt-BR", {
        timeZone: "America/Sao_Paulo",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function fillSessionSelect(rows) {
      const sessions = [...new Set(rows.map(item => item.sessionId))].filter(Boolean);

      sessions.sort((a, b) => {
        const aNum = parseInt(String(a).replace("SESSAO_", ""), 10);
        const bNum = parseInt(String(b).replace("SESSAO_", ""), 10);
        return bNum - aNum;
      });

      sessionSelect.innerHTML = "";

      sessions.forEach(sessionId => {
        const option = document.createElement("option");
        option.value = sessionId;
        option.textContent = formatSession(sessionId);
        sessionSelect.appendChild(option);
      });
    }

    function renderMap(rows) {
      if (!rows.length) {
        statusEl.innerText = "Nenhum ponto disponível para a sessão selecionada.";

        if (heatLayer) {
          map.removeLayer(heatLayer);
          heatLayer = null;
        }

        pointLayerGroup.clearLayers();
        return;
      }

      const maxDuracao = Math.max(...rows.map(r => r.duracao), 1);

      const heatData = rows.map(item => [
        item.lat,
        item.lon,
        Math.max(item.duracao / maxDuracao, 0.15)
      ]);

      if (heatLayer) {
        map.removeLayer(heatLayer);
      }

      pointLayerGroup.clearLayers();

      heatLayer = L.heatLayer(heatData, {
        radius: 35,
        blur: 25,
        maxZoom: 20,
        minOpacity: 0.35
      }).addTo(map);

      rows.forEach(item => {
        L.circleMarker([item.lat, item.lon], {
          radius: 6,
          weight: 1,
          color: "#f4b400",
          fillColor: "#f4b400",
          fillOpacity: 0.75
        })
        .addTo(pointLayerGroup)
        .bindPopup(
          "<b>" + item.beaconName + "</b><br>" +
          "SESSÃO: " + formatSession(item.sessionId) + "<br>" +
          "ID: " + item.beaconId + "<br>" +
          "LAT: " + item.lat + "<br>" +
          "LON: " + item.lon + "<br>" +
          "DURAÇÃO: " + Math.round(item.duracao) + " s"
        );
      });

      const bounds = L.latLngBounds(rows.map(item => [item.lat, item.lon]));
      map.fitBounds(bounds.pad(0.2));

      statusEl.innerText =
        "Sessão " + formatSession(rows[0].sessionId) +
        " carregada com " + rows.length + " ponto(s).";
    }

    function applySessionFilter() {
      const selectedSession = sessionSelect.value;
      const filteredRows = allRows.filter(item => item.sessionId === selectedSession);
      renderMap(filteredRows);
    }

    async function loadHeatmap() {
      try {
        statusEl.innerText = "Carregando dados da planilha...";

        const response = await fetch(CSV_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Falha ao acessar CSV");
        }

        const csvText = await response.text();
        const lines = csvText.trim().split(/\r?\n/);

        if (lines.length < 2) {
          throw new Error("CSV sem dados");
        }

        const headers = parseCSVLine(lines[0]).map(h => h.trim().toUpperCase());

        const idxSessionId = headers.indexOf("SESSION_ID");
        const idxBeaconId = headers.indexOf("BEACON_ID");
        const idxBeaconName = headers.indexOf("BEACON_NAME");
        const idxLat = headers.indexOf("LAT");
        const idxLon = headers.indexOf("LON");
        const idxDuracao = headers.indexOf("DURACAO");

        if (
          idxSessionId === -1 ||
          idxBeaconId === -1 ||
          idxBeaconName === -1 ||
          idxLat === -1 ||
          idxLon === -1 ||
          idxDuracao === -1
        ) {
          throw new Error("Cabeçalhos esperados não encontrados no CSV");
        }

        allRows = lines.slice(1)
          .map(parseCSVLine)
          .map(cols => {
            const lat = normalizeNumber(cols[idxLat]);
            const lon = normalizeNumber(cols[idxLon]);
            const duracao = normalizeNumber(cols[idxDuracao]);

            return {
              sessionId: (cols[idxSessionId] || "").trim(),
              beaconId: (cols[idxBeaconId] || "").trim(),
              beaconName: (cols[idxBeaconName] || "").trim(),
              lat,
              lon,
              duracao
            };
          })
          .filter(item =>
            item.sessionId &&
            !Number.isNaN(item.lat) &&
            !Number.isNaN(item.lon) &&
            !Number.isNaN(item.duracao)
          );

        if (!allRows.length) {
          throw new Error("Nenhuma linha válida encontrada");
        }

        fillSessionSelect(allRows);
        applySessionFilter();
      } catch (error) {
        statusEl.innerText = "Erro ao carregar mapa: " + error.message;
      }
    }

    sessionSelect.addEventListener("change", applySessionFilter);
    reloadBtn.addEventListener("click", loadHeatmap);

    loadHeatmap();
  </script>
</body>
</html>
