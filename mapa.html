<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimble Sense</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root {
      --bg: #34302F;
      --panel: rgba(20, 20, 20, 0.58);
      --panel-strong: rgba(20, 20, 20, 0.78);
      --border: rgba(255,255,255,0.12);
      --text: #f1f1f1;
      --text-soft: #cfcfcf;
      --accent: #f4b400;
      --accent-soft: rgba(244,180,0,0.18);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--bg);
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 20px 10px 20px;
      pointer-events: none;
    }

    .brand-logo {
      width: 180px;
      max-width: 60vw;
      height: auto;
      object-fit: contain;
      display: block;
      pointer-events: auto;
    }

    .map-wrapper {
      position: absolute;
      inset: 0;
      padding-top: 96px;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .floating-panel {
      position: absolute;
      top: 112px;
      left: 46px;
      z-index: 900;
      width: 320px;
      max-width: calc(100vw - 92px);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: 0.2s ease;
    }

    .floating-panel.collapsed .floating-body {
      display: none;
    }

    .floating-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .floating-panel.collapsed .floating-header {
      border-bottom: none;
    }

    .floating-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(244,180,0,0.45);
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      min-width: 96px;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(244,180,0,0.24);
    }

    .btn-icon {
      min-width: 38px;
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
    }

    .floating-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .field select option {
      color: #111;
    }

    .legend {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .legend-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }

    .legend-scale {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #243b7a 0%, #2b7bff 25%, #40c8ff 45%, #f4b400 70%, #ff5f3a 100%);
      margin-bottom: 10px;
    }

    .legend-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 11px;
      color: var(--text-soft);
    }

    .status-chip {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 900;
      max-width: min(420px, calc(100vw - 36px));
      background: var(--panel-strong);
      color: var(--text-soft);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .map-caption {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 900;
      background: rgba(18,18,18,0.78);
      color: var(--text-soft);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #202020;
      color: #f1f1f1;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 768px) {
      .topbar {
        padding-top: 16px;
        padding-bottom: 8px;
      }

      .brand-logo {
        width: 160px;
        max-width: 52vw;
      }

      .map-wrapper {
        padding-top: 88px;
      }

      .floating-panel {
        top: 98px;
        left: 56px;
        right: 12px;
        width: auto;
        max-width: none;
      }

      .floating-header {
        padding: 12px 14px;
      }

      .btn {
        min-width: 88px;
        padding: 9px 12px;
        font-size: 12px;
      }

      .btn-icon {
        min-width: 34px;
        width: 34px;
        height: 34px;
        font-size: 16px;
      }

      .status-chip {
        left: 12px;
        right: 12px;
        bottom: 58px;
        max-width: none;
      }

      .map-caption {
        right: 12px;
        bottom: 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="topbar">
      <img class="brand-logo" src="Nimble VS AM CENTRO.png" alt="Nimble Virtual Solutions">
    </div>

    <div class="floating-panel" id="floatingPanel">
      <div class="floating-header">
        <div class="floating-title">Leituras</div>

        <div class="header-actions">
          <button class="btn" id="reloadBtn">Atualizar</button>
          <button class="btn btn-icon" id="togglePanelBtn" title="Expandir / recolher">−</button>
        </div>
      </div>

      <div class="floating-body">
        <div class="field">
          <select id="sessionSelect"></select>
        </div>

        <div class="legend">
          <div class="legend-title">Intensidade de Permanência</div>
          <div class="legend-scale"></div>
          <div class="legend-row">
            <span>Menor</span>
            <span>Maior</span>
          </div>
        </div>
      </div>
    </div>

    <div class="map-wrapper">
      <div id="map"></div>
    </div>

    <div class="status-chip" id="status">Carregando dados da planilha...</div>
    <div class="map-caption">Base cartográfica: OpenStreetMap</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQb2jTurQ3bmlTjrNktoGn3TrGcm2gdUDjEP1teOyFIEvmRU6mFdo84FRIhFza1e1a8BO9g3cmIwPFF/pub?gid=1075648457&single=true&output=csv";

    const statusEl = document.getElementById("status");
    const sessionSelect = document.getElementById("sessionSelect");
    const reloadBtn = document.getElementById("reloadBtn");
    const floatingPanel = document.getElementById("floatingPanel");
    const togglePanelBtn = document.getElementById("togglePanelBtn");

    const map = L.map("map").setView([-23.5882, -46.6439], 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 22,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let heatLayer = null;
    let pointLayerGroup = L.layerGroup().addTo(map);
    let allRows = [];

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (insideQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function normalizeNumber(value) {
      if (value === null || value === undefined) return NaN;
      const cleaned = String(value).trim().replace(",", ".");
      return parseFloat(cleaned);
    }

    function formatSession(sessionId) {
      if (!sessionId) return "";

      const timestamp = String(sessionId).replace("SESSAO_", "");
      const millis = parseInt(timestamp, 10);

      if (Number.isNaN(millis)) return sessionId;

      const date = new Date(millis);

      return date.toLocaleString("pt-BR", {
        timeZone: "America/Sao_Paulo",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function fillSessionSelect(rows) {
      const sessions = [...new Set(rows.map(item => item.sessionId))].filter(Boolean);

      sessions.sort((a, b) => {
        const aNum = parseInt(String(a).replace("SESSAO_", ""), 10);
        const bNum = parseInt(String(b).replace("SESSAO_", ""), 10);
        return bNum - aNum;
      });

      sessionSelect.innerHTML = "";

      sessions.forEach(sessionId => {
        const option = document.createElement("option");
        option.value = sessionId;
        option.textContent = formatSession(sessionId);
        sessionSelect.appendChild(option);
      });
    }

    function renderMap(rows) {
      if (!rows.length) {
        statusEl.innerText = "Nenhum ponto disponível para a sessão selecionada.";

        if (heatLayer) {
          map.removeLayer(heatLayer);
          heatLayer = null;
        }

        pointLayerGroup.clearLayers();
        return;
      }

      const maxDuracao = Math.max(...rows.map(r => r.duracao), 1);

      const heatData = rows.map(item => [
        item.lat,
        item.lon,
        Math.max(item.duracao / maxDuracao, 0.15)
      ]);

      if (heatLayer) {
        map.removeLayer(heatLayer);
      }

      pointLayerGroup.clearLayers();

      heatLayer = L.heatLayer(heatData, {
        radius: 35,
        blur: 25,
        maxZoom: 20,
        minOpacity: 0.35
      }).addTo(map);

      rows.forEach(item => {
        L.circleMarker([item.lat, item.lon], {
          radius: 6,
          weight: 1,
          color: "#f4b400",
          fillColor: "#f4b400",
          fillOpacity: 0.75
        })
        .addTo(pointLayerGroup)
        .bindPopup(
          "<b>" + item.beaconName + "</b><br>" +
          "SESSÃO: " + formatSession(item.sessionId) + "<br>" +
          "ID: " + item.beaconId + "<br>" +
          "LAT: " + item.lat + "<br>" +
          "LON: " + item.lon + "<br>" +
          "DURAÇÃO: " + Math.round(item.duracao) + " s"
        );
      });

      const bounds = L.latLngBounds(rows.map(item => [item.lat, item.lon]));
      map.fitBounds(bounds.pad(0.2));

      statusEl.innerText =
        "Sessão " + formatSession(rows[0].sessionId) +
        " carregada com " + rows.length + " ponto(s).";
    }

    function applySessionFilter() {
      const selectedSession = sessionSelect.value;
      const filteredRows = allRows.filter(item => item.sessionId === selectedSession);
      renderMap(filteredRows);
    }

    async function loadHeatmap() {
      try {
        statusEl.innerText = "Carregando dados da planilha...";

        const response = await fetch(CSV_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Falha ao acessar CSV");
        }

        const csvText = await response.text();
        const lines = csvText.trim().split(/\r?\n/);

        if (lines.length < 2) {
          throw new Error("CSV sem dados");
        }

        const headers = parseCSVLine(lines[0]).map(h => h.trim().toUpperCase());

        const idxSessionId = headers.indexOf("SESSION_ID");
        const idxBeaconId = headers.indexOf("BEACON_ID");
        const idxBeaconName = headers.indexOf("BEACON_NAME");
        const idxLat = headers.indexOf("LAT");
        const idxLon = headers.indexOf("LON");
        const idxDuracao = headers.indexOf("DURACAO");

        if (
          idxSessionId === -1 ||
          idxBeaconId === -1 ||
          idxBeaconName === -1 ||
          idxLat === -1 ||
          idxLon === -1 ||
          idxDuracao === -1
        ) {
          throw new Error("Cabeçalhos esperados não encontrados no CSV");
        }

        allRows = lines.slice(1)
          .map(parseCSVLine)
          .map(cols => {
            const lat = normalizeNumber(cols[idxLat]);
            const lon = normalizeNumber(cols[idxLon]);
            const duracao = normalizeNumber(cols[idxDuracao]);

            return {
              sessionId: (cols[idxSessionId] || "").trim(),
              beaconId: (cols[idxBeaconId] || "").trim(),
              beaconName: (cols[idxBeaconName] || "").trim(),
              lat,
              lon,
              duracao
            };
          })
          .filter(item =>
            item.sessionId &&
            !Number.isNaN(item.lat) &&
            !Number.isNaN(item.lon) &&
            !Number.isNaN(item.duracao)
          );

        if (!allRows.length) {
          throw new Error("Nenhuma linha válida encontrada");
        }

        fillSessionSelect(allRows);
        applySessionFilter();
      } catch (error) {
        statusEl.innerText = "Erro ao carregar mapa: " + error.message;
      }
    }

    function togglePanel() {
      floatingPanel.classList.toggle("collapsed");
      togglePanelBtn.textContent = floatingPanel.classList.contains("collapsed") ? "+" : "−";
    }

    sessionSelect.addEventListener("change", applySessionFilter);
    reloadBtn.addEventListener("click", loadHeatmap);
    togglePanelBtn.addEventListener("click", togglePanel);

    loadHeatmap();
  </script>
</body>
</html>
