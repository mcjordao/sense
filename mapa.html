<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimble Sense</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#34302F; }
#map { height:100vh; }

.leaflet-popup-content {
  font-size:13px;
  line-height:1.4;
}

.popup-img {
  width:100%;
  max-width:160px;
  margin-top:6px;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQb2jTurQ3bmlTjrNktoGn3TrGcm2gdUDjEP1teOyFIEvmRU6mFdo84FRIhFza1e1a8BO9g3cmIwPFF/pub?gid=1075648457&single=true&output=csv";

const map = L.map("map").setView([-23.5882, -46.6439], 18);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

function parseCSVLine(line){
  return line.split(",");
}

function formatSession(sessionId){
  const ts = parseInt(sessionId.replace("SESSAO_",""));
  const d = new Date(ts);
  return d.toLocaleString("pt-BR");
}

async function load(){

  const res = await fetch(CSV_URL);
  const txt = await res.text();

  const lines = txt.trim().split("\n");
  const headers = parseCSVLine(lines[0]);

  const idxSession = headers.indexOf("SESSION_ID");
  const idxBeacon = headers.indexOf("BEACON_ID");
  const idxUser = headers.indexOf("USUARIO");
  const idxImg = headers.indexOf("IMAGEM");
  const idxLat = headers.indexOf("LAT");
  const idxLon = headers.indexOf("LON");
  const idxDur = headers.indexOf("DURACAO");

  const rows = lines.slice(1).map(l => {
    const c = parseCSVLine(l);
    return {
      session: c[idxSession],
      beacon: c[idxBeacon],
      user: c[idxUser],
      img: c[idxImg],
      lat: parseFloat(c[idxLat]),
      lon: parseFloat(c[idxLon]),
      dur: parseFloat(c[idxDur])
    };
  });

  const maxDur = Math.max(...rows.map(r=>r.dur),1);

  const heat = rows.map(r=>[
    r.lat,
    r.lon,
    r.dur/maxDur
  ]);

  L.heatLayer(heat,{radius:35}).addTo(map);

  rows.forEach(r=>{

    const popup = `
      <b>${r.user}</b><br>
      ${formatSession(r.session)}<br>
      LAT: ${r.lat}<br>
      LON: ${r.lon}
      ${r.img ? `<br><img class="popup-img" src="${r.img}">` : ""}
    `;

    L.circleMarker([r.lat,r.lon],{
      radius:6,
      color:"#f4b400",
      fillColor:"#f4b400",
      fillOpacity:0.8
    })
    .addTo(map)
    .bindPopup(popup);

  });

}

load();

</script>

</body>
</html>
