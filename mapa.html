<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimble Sense</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root {
      --bg: #34302F;
      --panel: rgba(20, 20, 20, 0.58);
      --panel-strong: rgba(20, 20, 20, 0.78);
      --border: rgba(255,255,255,0.12);
      --text: #f1f1f1;
      --text-soft: #cfcfcf;
      --accent: #f4b400;
      --accent-soft: rgba(244,180,0,0.18);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--bg);
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 20px 10px 20px;
      pointer-events: none;
    }

    .brand-logo {
      width: 180px;
      max-width: 60vw;
      height: auto;
      object-fit: contain;
      display: block;
      pointer-events: auto;
    }

    .map-wrapper {
      position: absolute;
      inset: 0;
      padding-top: 96px;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .floating-panel {
      position: absolute;
      top: 112px;
      left: 46px;
      z-index: 900;
      width: 320px;
      max-width: calc(100vw - 92px);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: 0.2s ease;
    }

    .floating-panel.collapsed .floating-body {
      display: none;
    }

    .chart-panel {
      position: absolute;
      top: 112px;
      right: 18px;
      z-index: 900;
      width: 440px;
      max-width: calc(100vw - 36px);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: 0.2s ease;
    }

    .chart-panel.collapsed .chart-body {
      display: none;
    }

    .floating-header,
    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .floating-panel.collapsed .floating-header,
    .chart-panel.collapsed .chart-header {
      border-bottom: none;
    }

    .floating-title,
    .chart-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(244,180,0,0.45);
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      min-width: 96px;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(244,180,0,0.24);
    }

    .btn-icon {
      min-width: 38px;
      width: 38px;
      height: 38px;
      padding: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
    }

    .floating-body,
    .chart-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .field select option {
      color: #111;
    }

    .legend {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .legend-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }

    .legend-scale {
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #243b7a 0%, #2b7bff 25%, #40c8ff 45%, #f4b400 70%, #ff5f3a 100%);
      margin-bottom: 10px;
    }

    .legend-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 11px;
      color: var(--text-soft);
    }

    .histogram-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(244,180,0,0.65) rgba(255,255,255,0.08);
    }

    .histogram-scroll::-webkit-scrollbar {
      height: 8px;
    }

    .histogram-scroll::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
    }

    .histogram-scroll::-webkit-scrollbar-thumb {
      background: rgba(244,180,0,0.65);
      border-radius: 999px;
    }

    .histogram-wrap {
      min-width: 100%;
      height: 250px;
      padding: 10px 8px 4px 8px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .histogram-svg {
      height: 100%;
      display: block;
      overflow: visible;
    }

    .chart-note {
      font-size: 11px;
      line-height: 1.45;
      color: var(--text-soft);
    }

    .status-chip {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 900;
      max-width: min(520px, calc(100vw - 36px));
      background: var(--panel-strong);
      color: var(--text-soft);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .leaflet-control-attribution {
      display: none;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #202020;
      color: #f1f1f1;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 800;
      color: #f4b400;
      margin-bottom: 6px;
    }

    @media (max-width: 768px) {
      .topbar {
        padding-top: 16px;
        padding-bottom: 8px;
      }

      .brand-logo {
        width: 160px;
        max-width: 52vw;
      }

      .map-wrapper {
        padding-top: 88px;
      }

      .floating-panel {
        top: 98px;
        left: 56px;
        right: 12px;
        width: auto;
        max-width: none;
      }

      .chart-panel {
        top: auto;
        left: 12px;
        right: 12px;
        bottom: 92px;
        width: auto;
        max-width: none;
      }

      .floating-header,
      .chart-header {
        padding: 12px 14px;
      }

      .btn {
        min-width: 88px;
        padding: 9px 12px;
        font-size: 12px;
      }

      .btn-icon {
        min-width: 34px;
        width: 34px;
        height: 34px;
        font-size: 16px;
      }

      .histogram-wrap {
        height: 220px;
      }

      .status-chip {
        left: 12px;
        right: 12px;
        bottom: 12px;
        max-width: none;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="topbar">
      <img class="brand-logo" src="Nimble VS AM CENTRO.png" alt="Nimble Virtual Solutions">
    </div>

    <div class="floating-panel" id="floatingPanel">
      <div class="floating-header">
        <div class="floating-title">Leituras</div>

        <div class="header-actions">
          <button class="btn" id="reloadBtn">Atualizar</button>
          <button class="btn btn-icon" id="togglePanelBtn" title="Expandir / recolher">−</button>
        </div>
      </div>

      <div class="floating-body">
        <div class="field">
          <select id="sessionSelect"></select>
        </div>

        <div class="legend">
          <div class="legend-title">Intensidade do Sinal</div>
          <div class="legend-scale"></div>
          <div class="legend-row">
            <span>Mais fraco</span>
            <span>Mais forte</span>
          </div>
        </div>
      </div>
    </div>

    <div class="chart-panel collapsed" id="chartPanel">
      <div class="chart-header">
        <div class="chart-title">Dispositivos por leitura</div>

        <div class="header-actions">
          <button class="btn btn-icon" id="toggleChartBtn" title="Expandir / recolher">+</button>
        </div>
      </div>

      <div class="chart-body">
        <div class="histogram-scroll" id="histogramScroll">
          <div class="histogram-wrap" id="histogramWrap">
            <svg class="histogram-svg" id="histogramSvg"></svg>
          </div>
        </div>

        <div class="chart-note">
          Eixo X: data/sessão. Eixo Y: quantidade de BEACON_ID distintos. Arraste horizontalmente para ver mais sessões.
        </div>
      </div>
    </div>

    <div class="map-wrapper">
      <div id="map"></div>
    </div>

    <div class="status-chip" id="status">Carregando dados da planilha...</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQb2jTurQ3bmlTjrNktoGn3TrGcm2gdUDjEP1teOyFIEvmRU6mFdo84FRIhFza1e1a8BO9g3cmIwPFF/pub?gid=1075648457&single=true&output=csv";

    const statusEl = document.getElementById("status");
    const sessionSelect = document.getElementById("sessionSelect");
    const reloadBtn = document.getElementById("reloadBtn");
    const floatingPanel = document.getElementById("floatingPanel");
    const togglePanelBtn = document.getElementById("togglePanelBtn");
    const chartPanel = document.getElementById("chartPanel");
    const toggleChartBtn = document.getElementById("toggleChartBtn");
    const histogramSvg = document.getElementById("histogramSvg");
    const histogramWrap = document.getElementById("histogramWrap");

    const map = L.map("map", {
      attributionControl: false
    }).setView([-23.5882, -46.6439], 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 22
    }).addTo(map);

    let heatLayer = null;
    let pointLayerGroup = L.layerGroup().addTo(map);
    let allRows = [];

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === "\"") {
          if (insideQuotes && nextChar === "\"") {
            current += "\"";
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function normalizeNumber(value) {
      if (value === null || value === undefined) return NaN;
      const cleaned = String(value).trim().replace(",", ".");
      return parseFloat(cleaned);
    }

    function sanitizeText(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getHeaderIndex(headers, alternatives) {
      for (const name of alternatives) {
        const idx = headers.indexOf(name);
        if (idx !== -1) return idx;
      }
      return -1;
    }

    function getSessionMillis(sessionId) {
      if (!sessionId) return NaN;

      const timestamp = String(sessionId).replace("SESSAO_", "");
      const millis = parseInt(timestamp, 10);

      return millis;
    }

    function formatSession(sessionId) {
      if (!sessionId) return "";

      const millis = getSessionMillis(sessionId);

      if (Number.isNaN(millis)) return sessionId;

      const date = new Date(millis);

      return date.toLocaleString("pt-BR", {
        timeZone: "America/Sao_Paulo",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function formatSessionShort(sessionId) {
      if (!sessionId) return "";

      const millis = getSessionMillis(sessionId);

      if (Number.isNaN(millis)) return sessionId;

      const date = new Date(millis);

      return date.toLocaleString("pt-BR", {
        timeZone: "America/Sao_Paulo",
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function fillSessionSelect(rows) {
      const sessions = [...new Set(rows.map(item => item.sessionId))].filter(Boolean);

      sessions.sort((a, b) => {
        const aNum = getSessionMillis(a);
        const bNum = getSessionMillis(b);
        return bNum - aNum;
      });

      sessionSelect.innerHTML = "";

      sessions.forEach(sessionId => {
        const option = document.createElement("option");
        option.value = sessionId;
        option.textContent = formatSession(sessionId);
        sessionSelect.appendChild(option);
      });
    }

    function getDistinctDeviceCountBySession(rows) {
      const grouped = new Map();

      rows.forEach(item => {
        if (!item.sessionId || !item.beaconId) return;

        if (!grouped.has(item.sessionId)) {
          grouped.set(item.sessionId, new Set());
        }

        grouped.get(item.sessionId).add(item.beaconId);
      });

      return [...grouped.entries()]
        .map(([sessionId, devices]) => ({
          sessionId,
          label: formatSessionShort(sessionId),
          count: devices.size,
          millis: getSessionMillis(sessionId)
        }))
        .sort((a, b) => a.millis - b.millis);
    }

    function createSvgElement(tagName, attrs) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", tagName);

      Object.keys(attrs).forEach(key => {
        element.setAttribute(key, attrs[key]);
      });

      return element;
    }

    function renderHistogram(rows) {
      const data = getDistinctDeviceCountBySession(rows);
      histogramSvg.innerHTML = "";

      if (!data.length) {
        histogramWrap.style.width = "100%";
        histogramSvg.setAttribute("width", "100%");
        histogramSvg.setAttribute("viewBox", "0 0 420 230");

        const emptyText = createSvgElement("text", {
          x: "210",
          y: "115",
          "text-anchor": "middle",
          "dominant-baseline": "middle",
          fill: "#cfcfcf",
          "font-size": "12"
        });

        emptyText.textContent = "Sem dados para exibir";
        histogramSvg.appendChild(emptyText);
        return;
      }

      const minBarWidth = 28;
      const barGap = 10;
      const margin = {
        top: 16,
        right: 18,
        bottom: 86,
        left: 34
      };

      const visibleBaseWidth = 420;
      const plotWidthByData = data.length * minBarWidth + Math.max(0, data.length - 1) * barGap;
      const width = Math.max(visibleBaseWidth, margin.left + margin.right + plotWidthByData);
      const height = 230;
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const maxCount = Math.max(...data.map(item => item.count), 1);
      const barWidth = minBarWidth;

      histogramWrap.style.width = `${width}px`;
      histogramSvg.setAttribute("width", `${width}`);
      histogramSvg.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const axisColor = "rgba(255,255,255,0.28)";
      const textColor = "#cfcfcf";
      const barColor = "#f4b400";

      const yAxis = createSvgElement("line", {
        x1: margin.left,
        y1: margin.top,
        x2: margin.left,
        y2: margin.top + plotHeight,
        stroke: axisColor,
        "stroke-width": "1"
      });

      const xAxis = createSvgElement("line", {
        x1: margin.left,
        y1: margin.top + plotHeight,
        x2: margin.left + plotWidth,
        y2: margin.top + plotHeight,
        stroke: axisColor,
        "stroke-width": "1"
      });

      histogramSvg.appendChild(yAxis);
      histogramSvg.appendChild(xAxis);

      const yTicks = Math.min(maxCount, 4);

      for (let i = 0; i <= yTicks; i++) {
        const value = Math.round((maxCount / yTicks) * i);
        const y = margin.top + plotHeight - (value / maxCount) * plotHeight;

        const gridLine = createSvgElement("line", {
          x1: margin.left,
          y1: y,
          x2: margin.left + plotWidth,
          y2: y,
          stroke: "rgba(255,255,255,0.08)",
          "stroke-width": "1"
        });

        const tickText = createSvgElement("text", {
          x: margin.left - 8,
          y: y + 4,
          "text-anchor": "end",
          fill: textColor,
          "font-size": "10"
        });

        tickText.textContent = value;

        histogramSvg.appendChild(gridLine);
        histogramSvg.appendChild(tickText);
      }

      data.forEach((item, index) => {
        const x = margin.left + index * (barWidth + barGap);
        const barHeight = (item.count / maxCount) * plotHeight;
        const y = margin.top + plotHeight - barHeight;

        const bar = createSvgElement("rect", {
          x,
          y,
          width: barWidth,
          height: barHeight,
          rx: "5",
          fill: barColor,
          opacity: "0.9"
        });

        const valueText = createSvgElement("text", {
          x: x + barWidth / 2,
          y: y - 6,
          "text-anchor": "middle",
          fill: "#f1f1f1",
          "font-size": "11",
          "font-weight": "700"
        });

        valueText.textContent = item.count;

        const labelText = createSvgElement("text", {
          x: x + barWidth / 2,
          y: margin.top + plotHeight + 42,
          "text-anchor": "middle",
          fill: textColor,
          "font-size": "9",
          transform: `rotate(-32 ${x + barWidth / 2} ${margin.top + plotHeight + 42})`
        });

        labelText.textContent = item.label;

        const title = createSvgElement("title", {});
        title.textContent = `${formatSession(item.sessionId)}: ${item.count} dispositivo(s) distinto(s)`;

        bar.appendChild(title);

        histogramSvg.appendChild(bar);
        histogramSvg.appendChild(valueText);
        histogramSvg.appendChild(labelText);
      });
    }

    function renderMap(rows) {
      if (!rows.length) {
        statusEl.innerText = "Nenhum ponto disponível para a sessão selecionada.";

        if (heatLayer) {
          map.removeLayer(heatLayer);
          heatLayer = null;
        }

        pointLayerGroup.clearLayers();
        return;
      }

      const heatData = rows.map(item => [
        item.lat,
        item.lon,
        item.pesoHeatmap
      ]);

      if (heatLayer) {
        map.removeLayer(heatLayer);
      }

      pointLayerGroup.clearLayers();

      heatLayer = L.heatLayer(heatData, {
        radius: 35,
        blur: 25,
        maxZoom: 20,
        minOpacity: 0.35
      }).addTo(map);

      rows.forEach(item => {
        const popupName = item.usuario || item.beaconName || "Beacon sem nome";

        L.circleMarker([item.lat, item.lon], {
          radius: 6,
          weight: 1,
          color: "#f4b400",
          fillColor: "#f4b400",
          fillOpacity: 0.75
        })
        .addTo(pointLayerGroup)
        .bindPopup(
          "<div class='popup-title'>" + sanitizeText(popupName) + "</div>" +
          "ID: " + sanitizeText(item.macAddress || "NÃO CADASTRADO") + "<br>" +
          "LATITUDE: " + sanitizeText(item.lat) + "<br>" +
          "LONGITUDE: " + sanitizeText(item.lon) + "<br>" +
          "LEITURA: " + sanitizeText(item.timestampLeitura || "--")
        );
      });

      const bounds = L.latLngBounds(rows.map(item => [item.lat, item.lon]));
      map.fitBounds(bounds.pad(0.2));

      const distinctDevices = new Set(rows.map(item => item.beaconId).filter(Boolean)).size;

      statusEl.innerText =
        "Sessão " + formatSession(rows[0].sessionId) +
        " carregada com " + rows.length + " ponto(s) e " +
        distinctDevices + " dispositivo(s) distinto(s).";
    }

    function applySessionFilter() {
      const selectedSession = sessionSelect.value;
      const filteredRows = allRows.filter(item => item.sessionId === selectedSession);
      renderMap(filteredRows);
    }

    async function loadHeatmap() {
      try {
        statusEl.innerText = "Carregando dados da planilha...";

        const response = await fetch(CSV_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("Falha ao acessar CSV");
        }

        const csvText = await response.text();
        const lines = csvText.trim().split(/\r?\n/);

        if (lines.length < 2) {
          throw new Error("CSV sem dados");
        }

        const headers = parseCSVLine(lines[0]).map(h => h.trim().toUpperCase());

        const idxSessionId = getHeaderIndex(headers, ["SESSION_ID"]);
        const idxBeaconId = getHeaderIndex(headers, ["BEACON_ID"]);
        const idxBeaconName = getHeaderIndex(headers, ["BEACON_NAME"]);
        const idxUsuario = getHeaderIndex(headers, ["USUARIO"]);
        const idxMacAddress = getHeaderIndex(headers, ["MAC_ADDRESS"]);
        const idxImagem = getHeaderIndex(headers, ["IMAGEM"]);
        const idxTimestampLeitura = getHeaderIndex(headers, ["TIMESTAMP_LEITURA"]);
        const idxLat = getHeaderIndex(headers, ["LATITUDE", "LAT"]);
        const idxLon = getHeaderIndex(headers, ["LONGITUDE", "LON"]);
        const idxRssi = getHeaderIndex(headers, ["RSSI"]);
        const idxPesoHeatmap = getHeaderIndex(headers, ["PESO_HEATMAP"]);

        if (
          idxSessionId === -1 ||
          idxBeaconId === -1 ||
          idxLat === -1 ||
          idxLon === -1 ||
          idxRssi === -1
        ) {
          throw new Error(
            "Cabeçalhos esperados não encontrados no CSV. Verifique SESSION_ID, BEACON_ID, LAT/LATITUDE, LON/LONGITUDE e RSSI."
          );
        }

        allRows = lines.slice(1)
          .map(parseCSVLine)
          .map(cols => {
            const lat = normalizeNumber(cols[idxLat]);
            const lon = normalizeNumber(cols[idxLon]);
            const rssi = normalizeNumber(cols[idxRssi]);
            const pesoRaw = idxPesoHeatmap >= 0 ? normalizeNumber(cols[idxPesoHeatmap]) : NaN;
            const pesoHeatmap = Number.isNaN(pesoRaw) ? 0.2 : Math.max(0.05, Math.min(pesoRaw / 100, 1));

            return {
              sessionId: (cols[idxSessionId] || "").trim(),
              beaconId: (cols[idxBeaconId] || "").trim(),
              beaconName: idxBeaconName >= 0 ? (cols[idxBeaconName] || "").trim() : "",
              usuario: idxUsuario >= 0 ? (cols[idxUsuario] || "").trim() : "",
              macAddress: idxMacAddress >= 0 ? (cols[idxMacAddress] || "").trim() : "",
              imagem: idxImagem >= 0 ? (cols[idxImagem] || "").trim() : "",
              timestampLeitura: idxTimestampLeitura >= 0 ? (cols[idxTimestampLeitura] || "").trim() : "",
              lat,
              lon,
              rssi,
              pesoHeatmap
            };
          })
          .filter(item =>
            item.sessionId &&
            !Number.isNaN(item.lat) &&
            !Number.isNaN(item.lon) &&
            !Number.isNaN(item.rssi)
          );

        if (!allRows.length) {
          throw new Error("Nenhuma linha válida encontrada");
        }

        fillSessionSelect(allRows);
        renderHistogram(allRows);
        applySessionFilter();
      } catch (error) {
        statusEl.innerText = "Erro ao carregar mapa: " + error.message;
        renderHistogram([]);
      }
    }

    function togglePanel() {
      floatingPanel.classList.toggle("collapsed");
      togglePanelBtn.textContent = floatingPanel.classList.contains("collapsed") ? "+" : "−";
    }

    function toggleChart() {
      chartPanel.classList.toggle("collapsed");
      toggleChartBtn.textContent = chartPanel.classList.contains("collapsed") ? "+" : "−";
    }

    sessionSelect.addEventListener("change", applySessionFilter);
    reloadBtn.addEventListener("click", loadHeatmap);
    togglePanelBtn.addEventListener("click", togglePanel);
    toggleChartBtn.addEventListener("click", toggleChart);

    loadHeatmap();
  </script>
</body>
</html>
