<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVS Beacon - Heatmap</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .topbar {
      padding: 12px 16px;
      background: #1f1f1f;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
    }

    .info {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #dddddd;
      font-size: 14px;
    }

    #map {
      width: 100%;
      height: calc(100% - 88px);
    }
  </style>
</head>
<body>
  <div class="topbar">NVS Beacon - Heatmap</div>
  <div class="info" id="status">Mapa carregado. Próximo passo: ligar aos dados reais.</div>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script>
    const statusEl = document.getElementById("status");

    const map = L.map("map").setView([-23.5882, -46.6439], 18);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 22,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const heatData = [
      [-23.5882575, -46.6439365, 42]
    ];

    const normalizedHeatData = heatData.map(item => {
      const lat = item[0];
      const lon = item[1];
      const weight = Math.min(item[2] / 50, 1);
      return [lat, lon, weight];
    });

    L.heatLayer(normalizedHeatData, {
      radius: 35,
      blur: 25,
      maxZoom: 20,
      minOpacity: 0.35
    }).addTo(map);

    heatData.forEach(item => {
      L.circleMarker([item[0], item[1]], {
        radius: 6,
        weight: 1,
        fillOpacity: 0.8
      })
      .addTo(map)
      .bindPopup(
        "LAT: " + item[0] + "<br>" +
        "LON: " + item[1] + "<br>" +
        "DURAÇÃO: " + item[2] + " s"
      );
    });

    const bounds = L.latLngBounds(heatData.map(item => [item[0], item[1]]));
    map.fitBounds(bounds.pad(0.2));

    statusEl.innerText = "Heatmap de teste carregado com dados simulados da sua planilha.";
  </script>
</body>
</html>
