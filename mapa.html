<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimble Sense</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .topbar {
      padding: 12px 16px;
      background: #1f1f1f;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #dddddd;
      flex-wrap: wrap;
    }

    .controls select,
    .controls button {
      padding: 8px 10px;
      font-size: 14px;
    }

    .info {
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 1px solid #dddddd;
      font-size: 14px;
    }

    #map {
      width: 100%;
      height: calc(100% - 138px);
    }
  </style>
</head>
<body>

<div class="topbar">Nimble Sense</div>

<div class="controls">
  <label for="sessionSelect">Sessão:</label>
  <select id="sessionSelect"></select>
  <button id="reloadBtn">Atualizar</button>
</div>

<div class="info" id="status">Carregando dados...</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQb2jTurQ3bmlTjrNktoGn3TrGcm2gdUDjEP1teOyFIEvmRU6mFdo84FRIhFza1e1a8BO9g3cmIwPFF/pub?gid=1075648457&single=true&output=csv";

const statusEl = document.getElementById("status");
const sessionSelect = document.getElementById("sessionSelect");
const reloadBtn = document.getElementById("reloadBtn");

const map = L.map("map").setView([-23.5882, -46.6439], 18);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 22
}).addTo(map);

let heatLayer;
let pointLayerGroup = L.layerGroup().addTo(map);
let allRows = [];

function parseCSVLine(line) {
  return line.split(",");
}

function normalizeNumber(value) {
  return parseFloat(String(value).replace(",", "."));
}

function formatSession(sessionId) {
  const timestamp = sessionId.replace("SESSAO_", "");
  const date = new Date(parseInt(timestamp));

  return date.toLocaleString("pt-BR", {
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function fillSessionSelect(rows) {
  const sessions = [...new Set(rows.map(r => r.sessionId))];

  sessionSelect.innerHTML = "";

  sessions.sort((a,b) => b.localeCompare(a));

  sessions.forEach(s => {
    const option = document.createElement("option");
    option.value = s;
    option.textContent = formatSession(s);
    sessionSelect.appendChild(option);
  });
}

function renderMap(rows) {
  if (!rows.length) return;

  const maxDuracao = Math.max(...rows.map(r => r.duracao), 1);

  const heatData = rows.map(r => [
    r.lat,
    r.lon,
    Math.max(r.duracao / maxDuracao, 0.15)
  ]);

  if (heatLayer) map.removeLayer(heatLayer);

  pointLayerGroup.clearLayers();

  heatLayer = L.heatLayer(heatData, {
    radius: 35,
    blur: 25
  }).addTo(map);

  rows.forEach(r => {
    L.circleMarker([r.lat, r.lon])
      .addTo(pointLayerGroup)
      .bindPopup(`
        <b>${r.beaconName}</b><br>
        ${formatSession(r.sessionId)}<br>
        ${r.duracao}s
      `);
  });

  map.fitBounds(rows.map(r => [r.lat, r.lon]));

  statusEl.innerText = "Sessão " + formatSession(rows[0].sessionId);
}

function applySessionFilter() {
  const selected = sessionSelect.value;
  const filtered = allRows.filter(r => r.sessionId === selected);
  renderMap(filtered);
}

async function loadHeatmap() {
  const response = await fetch(CSV_URL);
  const text = await response.text();
  const lines = text.trim().split("\n");

  const headers = parseCSVLine(lines[0]);

  const idxSession = headers.indexOf("SESSION_ID");
  const idxBeaconName = headers.indexOf("BEACON_NAME");
  const idxLat = headers.indexOf("LAT");
  const idxLon = headers.indexOf("LON");
  const idxDur = headers.indexOf("DURACAO");

  allRows = lines.slice(1).map(line => {
    const cols = parseCSVLine(line);

    return {
      sessionId: cols[idxSession],
      beaconName: cols[idxBeaconName],
      lat: normalizeNumber(cols[idxLat]),
      lon: normalizeNumber(cols[idxLon]),
      duracao: normalizeNumber(cols[idxDur])
    };
  });

  fillSessionSelect(allRows);
  applySessionFilter();
}

sessionSelect.addEventListener("change", applySessionFilter);
reloadBtn.addEventListener("click", loadHeatmap);

loadHeatmap();
</script>

</body>
</html>
