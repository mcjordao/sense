<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Nimble Sense</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page">

    <div class="logo-wrapper">
      <img src="Nimble VS AM CENTRO.png" class="logo" alt="Nimble Virtual Solutions">
    </div>

    <div class="actions">
      <button id="btnStart" class="btn btn-active" onclick="startScan()">INICIAR</button>
      <button id="btnStop" class="btn" onclick="stopScan()">FINALIZAR</button>
      <button id="btnSync" class="btn" onclick="syncData()">SINCRONIZAR</button>
    </div>

    <div id="status" class="status">
      Banco pronto
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
